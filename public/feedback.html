<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback — LYS OPS</title>
  <link rel="stylesheet" href="/css/style.css?v=1777098114">
  <style>
    .fb-form {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 28px;
    }
    .fb-form-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .fb-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 600px) {
      .fb-grid { grid-template-columns: 1fr; }
    }
    .fb-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .fb-field.full { grid-column: 1 / -1; }
    .fb-field label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .fb-field label span { color: var(--red); }
    .fb-actions {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
    }

    /* Ticket list */
    .ticket-list-header {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ticket-count {
      background: var(--bg3);
      color: var(--text);
      border-radius: 20px;
      padding: 1px 9px;
      font-size: 12px;
      font-weight: 700;
      text-transform: none;
      letter-spacing: 0;
    }
    .ticket-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
    }
    .ticket-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .ticket-title {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }
    .ticket-badges {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      border-radius: 4px;
      padding: 2px 7px;
    }
    .badge-bug      { background: rgba(226,68,92,0.15);  color: var(--red); }
    .badge-ui       { background: rgba(51,102,255,0.12); color: var(--accent); }
    .badge-feature  { background: rgba(0,200,117,0.12);  color: var(--green); }
    .badge-new      { background: rgba(253,171,61,0.15); color: var(--amber); }
    .badge-review   { background: rgba(51,102,255,0.12); color: var(--accent); }
    .badge-done     { background: rgba(0,200,117,0.12);  color: var(--green); }
    .badge-low      { background: rgba(107,114,148,0.15); color: var(--text-muted); }
    .badge-medium   { background: rgba(51,102,255,0.12); color: var(--accent); }
    .badge-high     { background: rgba(226,68,92,0.15);  color: var(--red); }

    .ticket-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .ticket-desc {
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }
    .ticket-admin-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 4px;
    }
    .ticket-admin-row label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .ticket-admin-row select {
      font-size: 11px;
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      cursor: pointer;
    }
    .del-ticket-btn {
      font-size: 11px;
      font-weight: 600;
      background: rgba(226,68,92,0.1);
      color: var(--red);
      border: 1px solid rgba(226,68,92,0.2);
      border-radius: 4px;
      padding: 3px 9px;
      cursor: pointer;
      margin-left: auto;
    }
    .del-ticket-btn:hover { background: rgba(226,68,92,0.2); }

    /* Comments */
    .ticket-comments {
      border-top: 1px solid var(--border);
      margin-top: 10px;
      padding-top: 10px;
    }
    .ticket-comments-toggle {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px 0;
      font-family: inherit;
    }
    .ticket-comments-toggle:hover { color: var(--text); }
    .comment-list { margin-top: 8px; }
    .comment-item {
      font-size: 12px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .comment-item:last-child { border-bottom: none; }
    .comment-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }
    .comment-author {
      font-weight: 600;
      font-size: 11px;
    }
    .comment-time {
      font-size: 10px;
      color: var(--text-muted);
    }
    .comment-del {
      font-size: 10px;
      color: var(--red);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0 2px;
      margin-left: auto;
      font-family: inherit;
      opacity: 0.6;
      min-width: 32px;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .comment-del:hover { opacity: 1; }
    .comment-text {
      color: var(--text);
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .comment-add {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      align-items: flex-start;
    }
    .comment-add textarea {
      flex: 1;
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      resize: vertical;
      min-height: 32px;
      font-family: inherit;
      line-height: 1.4;
    }
    .comment-add-btn {
      font-size: 11px;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
    }
    .comment-add-btn:disabled { opacity: 0.5; cursor: default; }

    /* Toast */
    #fb-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    #fb-toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title"><span>LYS</span> OPS · Feedback</div>
  <div style="display:flex;gap:8px;align-items:center;"></div>
</div>

<div class="tasks-layout">

  <!-- Left Sidebar -->
  <div class="tasks-sidebar">
    <a href="/" class="staff-nav-btn" style="text-decoration:none;">
      <span class="staff-initial" style="font-size:13px;">📊</span><span>Dashboard</span>
    </a>
    <div class="tasks-sidebar-label">Views</div>
    <a href="/my-tasks" class="staff-nav-btn" style="text-decoration:none;">
      <span class="staff-initial" style="font-size:13px;">👥</span><span>Team</span>
    </a>
    <a href="/factory" id="sidebar-factory-link" class="staff-nav-btn" style="text-decoration:none;display:flex;align-items:center;gap:8px;">
      <span class="staff-initial">🏭</span><span>Factory</span>
      <span id="sidebar-factory-badge" style="display:none;margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;min-width:16px;height:16px;padding:0 4px;align-items:center;justify-content:center;"></span>
    </a>
    <a href="/installation" class="staff-nav-btn" style="text-decoration:none;">
      <span class="staff-initial" style="font-size:13px;">🔧</span><span>Installation</span>
    </a>
    <a href="/procurement" class="staff-nav-btn" style="text-decoration:none;">
      <span class="staff-initial" style="font-size:13px;">🛒</span><span>Procurement</span>
    </a>
    <a href="/planning" class="staff-nav-btn" style="text-decoration:none;">
      <span class="staff-initial" style="font-size:13px;">📅</span><span>Manpower</span>
    </a>
    <a href="/feedback" class="staff-nav-btn active" style="text-decoration:none;">
      <span class="staff-initial" style="font-size:13px;">💬</span><span>Feedback</span>
    </a>
    <a href="new-project.html" class="staff-nav-btn" style="background:var(--accent);color:#fff;margin-top:8px;border-radius:var(--radius);text-decoration:none;">
      <span class="staff-initial" style="font-size:16px;background:rgba(255,255,255,0.2);">+</span><span>New Project</span>
    </a>
    <a href="admin.html" class="staff-nav-btn" style="text-decoration:none;margin-top:auto;border-top:1px solid rgba(255,255,255,0.08);padding-top:8px;flex-shrink:0;">
      <span class="staff-initial" style="font-size:13px;">⚙️</span><span>Admin</span>
    </a>
  </div>

  <!-- Main panel -->
  <div class="tasks-main">

    <!-- Submit Form -->
    <div class="fb-form">
      <div class="fb-form-title">Submit Feedback or Report an Issue</div>
      <div class="fb-grid">
        <div class="fb-field full">
          <label>Title <span>*</span></label>
          <input type="text" id="fb-title" class="tbl-input" placeholder="Short description of the issue or request…" autocomplete="off">
        </div>
        <div class="fb-field">
          <label>Type <span>*</span></label>
          <select id="fb-type" class="tbl-select">
            <option value="">— Select —</option>
            <option value="Bug">Bug</option>
            <option value="UI Feedback">UI Feedback</option>
            <option value="Feature Request">Feature Request</option>
          </select>
        </div>
        <div class="fb-field">
          <label>Priority</label>
          <select id="fb-priority" class="tbl-select">
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="fb-field full">
          <label>Description</label>
          <textarea id="fb-desc" class="tbl-input" rows="4" placeholder="Steps to reproduce, expected behaviour, screenshots description…" style="resize:vertical;"></textarea>
        </div>
        <div class="fb-field">
          <label>Your Name <span>*</span></label>
          <select id="fb-name" class="tbl-select">
            <option value="">— Select —</option>
          </select>
        </div>
      </div>
      <div class="fb-actions">
        <button id="fb-submit" class="btn" style="background:var(--accent);color:#fff;font-weight:600;min-width:120px;">Submit</button>
      </div>
    </div>

    <!-- Ticket List -->
    <div class="ticket-list-header">
      All Tickets
      <span class="ticket-count" id="ticket-count">0</span>
    </div>
    <div id="ticket-list"></div>

  </div>
</div>

<div id="fb-toast"></div>

<script src="/js/utils.js?v=1777098114"></script>
<script>
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, color) {
  const t = document.getElementById('fb-toast');
  t.textContent = msg;
  t.style.color = color || 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function typeBadgeClass(type) {
  if (type === 'Bug')             return 'badge-bug';
  if (type === 'UI Feedback')     return 'badge-ui';
  if (type === 'Feature Request') return 'badge-feature';
  return '';
}

function statusBadgeClass(status) {
  if (status === 'New')       return 'badge-new';
  if (status === 'In Review') return 'badge-review';
  if (status === 'Done')      return 'badge-done';
  return '';
}

function priorityBadgeClass(p) {
  if (p === 'High')   return 'badge-high';
  if (p === 'Medium') return 'badge-medium';
  return 'badge-low';
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-SG', { day: '2-digit', month: 'short', year: 'numeric' })
       + ' ' + d.toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit' });
}

// ── Load staff into name dropdown ──────────────────────
async function loadStaff() {
  const raw = await fetch('/api/staff').then(r => r.json());
  const seen = new Set();
  const names = Object.values(raw)
    .filter(s => s.name && !seen.has(s.name) && seen.add(s.name))
    .map(s => s.name)
    .sort();
  const sel = document.getElementById('fb-name');
  names.forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = n;
    sel.appendChild(o);
  });
}

let _currentUser = '';

function renderComments(ticket) {
  const comments = ticket.comments || [];
  if (!comments.length) return '<div style="font-size:11px;color:var(--text-muted);padding:4px 0;">No comments yet.</div>';
  return comments.map(c => `
    <div class="comment-item">
      <div class="comment-header">
        <span class="comment-author">${esc(c.author)}</span>
        <span class="comment-time">${formatDate(c.createdAt)}</span>
        <button class="comment-del" data-tid="${esc(ticket.id)}" data-cid="${esc(c.id)}" title="Delete comment">✕</button>
      </div>
      <div class="comment-text">${esc(c.text)}</div>
    </div>
  `).join('');
}

// ── Render ticket list ─────────────────────────────────
function renderTickets(tickets) {
  document.getElementById('ticket-count').textContent = tickets.length;
  const el = document.getElementById('ticket-list');
  if (!tickets.length) {
    el.innerHTML = '<div style="font-size:13px;color:var(--text-muted);padding:12px 0;">No tickets yet. Be the first to submit feedback!</div>';
    return;
  }
  el.innerHTML = tickets.map(t => `
    <div class="ticket-card" data-id="${esc(t.id)}">
      <div class="ticket-card-top">
        <div class="ticket-title">${esc(t.title)}</div>
        <div class="ticket-badges">
          <span class="badge ${typeBadgeClass(t.type)}">${esc(t.type)}</span>
          <span class="badge ${priorityBadgeClass(t.priority)}">${esc(t.priority)}</span>
          <span class="badge ${statusBadgeClass(t.status)} status-badge" data-id="${esc(t.id)}">${esc(t.status)}</span>
        </div>
      </div>
      <div class="ticket-meta">
        Submitted by <strong>${esc(t.submittedBy)}</strong> · ${formatDate(t.submittedAt)}
        ${t.notes ? ` · <em>${esc(t.notes)}</em>` : ''}
      </div>
      ${t.description ? `<div class="ticket-desc">${esc(t.description)}</div>` : ''}
      <div class="ticket-admin-row">
        <label>Status:</label>
        <select class="status-select" data-id="${esc(t.id)}">
          <option value="New"       ${t.status === 'New'       ? 'selected' : ''}>New</option>
          <option value="In Review" ${t.status === 'In Review' ? 'selected' : ''}>In Review</option>
          <option value="Done"      ${t.status === 'Done'      ? 'selected' : ''}>Done</option>
        </select>
        <label style="margin-left:8px;">Priority:</label>
        <select class="priority-select" data-id="${esc(t.id)}">
          <option value="Low"    ${t.priority === 'Low'    ? 'selected' : ''}>Low</option>
          <option value="Medium" ${t.priority === 'Medium' ? 'selected' : ''}>Medium</option>
          <option value="High"   ${t.priority === 'High'   ? 'selected' : ''}>High</option>
        </select>
        <button class="del-ticket-btn" data-id="${esc(t.id)}">Delete</button>
      </div>
      <div class="ticket-comments" data-id="${esc(t.id)}">
        <button class="ticket-comments-toggle" data-id="${esc(t.id)}">
          💬 Comments${(t.comments && t.comments.length) ? ' (' + t.comments.length + ')' : ''}
        </button>
        <div class="comment-thread" data-id="${esc(t.id)}" style="display:none;">
          <div class="comment-list">${renderComments(t)}</div>
          <div class="comment-add">
            <textarea class="comment-input" data-id="${esc(t.id)}" rows="1" placeholder="Add a comment…"></textarea>
            <button class="comment-add-btn" data-id="${esc(t.id)}">Post</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');

  // Status change
  el.querySelectorAll('.status-select').forEach(sel => {
    sel.addEventListener('change', async () => {
      const res = await fetch('/api/tickets/' + sel.dataset.id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: sel.value })
      });
      if (!res.ok) { showToast('Update failed'); return; }
      // update badge inline
      const badge = el.querySelector('.status-badge[data-id="' + sel.dataset.id + '"]');
      if (badge) {
        badge.textContent = sel.value;
        badge.className = 'badge ' + statusBadgeClass(sel.value) + ' status-badge';
        badge.dataset.id = sel.dataset.id;
      }
      showToast('Status updated');
    });
  });

  // Priority change
  el.querySelectorAll('.priority-select').forEach(sel => {
    sel.addEventListener('change', async () => {
      const res = await fetch('/api/tickets/' + sel.dataset.id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ priority: sel.value })
      });
      if (!res.ok) { showToast('Update failed'); return; }
      showToast('Priority updated');
    });
  });

  // Delete
  el.querySelectorAll('.del-ticket-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const result = await confirmDelete('Delete this ticket?', btn.closest('.ticket-card')?.querySelector('.ticket-title')?.textContent || '');
      if (!result) return;
      const res = await fetch('/api/tickets/' + btn.dataset.id, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason: result.reason })
      });
      if (!res.ok) { showToast('Delete failed'); return; }
      showToast('Ticket deleted', 'var(--red)');
      loadTickets();
    });
  });

  // Comment toggle
  el.querySelectorAll('.ticket-comments-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const thread = el.querySelector('.comment-thread[data-id="' + btn.dataset.id + '"]');
      if (thread) thread.style.display = thread.style.display === 'none' ? '' : 'none';
    });
  });

  // Post comment
  el.querySelectorAll('.comment-add-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const tid = btn.dataset.id;
      const input = el.querySelector('.comment-input[data-id="' + tid + '"]');
      const text = input.value.trim();
      if (!text) return;
      btn.disabled = true;
      try {
        const res = await fetch('/api/tickets/' + tid + '/comments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, author: _currentUser || 'Unknown' })
        });
        if (!res.ok) { showToast('Comment failed', 'var(--red)'); return; }
        showToast('Comment added');
        loadTickets();
      } finally {
        btn.disabled = false;
      }
    });
  });

  // Delete comment
  el.querySelectorAll('.comment-del').forEach(btn => {
    btn.addEventListener('click', async () => {
      const result = await confirmDelete('Delete this comment?', btn.closest('.comment-item')?.querySelector('.comment-text')?.textContent || '');
      if (!result) return;
      const res = await fetch('/api/tickets/' + btn.dataset.tid + '/comments/' + btn.dataset.cid, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason: result.reason })
      });
      if (!res.ok) { showToast('Delete failed', 'var(--red)'); return; }
      showToast('Comment deleted', 'var(--red)');
      loadTickets();
    });
  });
}

// ── Load tickets ───────────────────────────────────────
async function loadTickets() {
  const tickets = await fetch('/api/tickets').then(r => r.json());
  renderTickets(tickets);
}

// ── Submit handler ─────────────────────────────────────
document.getElementById('fb-submit').addEventListener('click', async () => {
  const title       = document.getElementById('fb-title').value.trim();
  const type        = document.getElementById('fb-type').value;
  const description = document.getElementById('fb-desc').value.trim();
  const submittedBy = document.getElementById('fb-name').value;
  const priority    = document.getElementById('fb-priority').value;

  if (!title)       { document.getElementById('fb-title').focus(); showToast('Title is required', 'var(--red)'); return; }
  if (!type)        { document.getElementById('fb-type').focus();  showToast('Select a type', 'var(--red)'); return; }
  if (!submittedBy) { document.getElementById('fb-name').focus();  showToast('Select your name', 'var(--red)'); return; }

  const btn = document.getElementById('fb-submit');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  try {
    const res = await fetch('/api/tickets', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, type, description, submittedBy, priority })
    });
    if (!res.ok) throw new Error('Failed');
    document.getElementById('fb-title').value = '';
    document.getElementById('fb-type').value = '';
    document.getElementById('fb-desc').value = '';
    document.getElementById('fb-name').value = '';
    document.getElementById('fb-priority').value = 'Medium';
    showToast('Ticket submitted!');
    loadTickets();
  } catch {
    showToast('Submit failed — please try again', 'var(--red)');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit';
  }
});

// ── Init ───────────────────────────────────────────────
fetch('/api/auth/me').then(r => r.json()).then(d => { _currentUser = d.name || ''; }).catch(() => {}).finally(() => {
  loadStaff();
  loadTickets();
});
</script>
<script src="/js/nav.js"></script>
</body>
</html>
