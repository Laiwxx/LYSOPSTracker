<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Team Tasks — LYS OPS</title>
  <link rel="stylesheet" href="/css/style.css?v=1776830235">
  <style>
    /* ── Type-grouped sections (Mandatory / Requests / Personal) ── */
    .mc-type-group {
      margin-bottom: 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .mc-type-group-hdr {
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .mc-type-group-hdr:hover { background: var(--bg3); }
    .mc-type-group-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .mc-type-group-hint {
      font-size: 11px;
      color: var(--text-muted);
    }
    .mc-type-group-counts {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
    }
    .mc-type-group-counts .n-open { color: var(--amber); font-weight: 700; }
    .mc-type-group-counts .n-done { color: var(--green); font-weight: 700; }
    .mc-type-group-chev {
      margin-left: 8px;
      color: var(--text-muted);
      font-size: 14px;
      transition: transform 0.2s;
      display: inline-block;
    }
    .mc-type-group-chev.collapsed { transform: rotate(-90deg); }
    .mc-type-group-body.collapsed { display: none; }
    .mc-empty-group {
      padding: 14px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── Shared task card styles (personal view) ── */
    .task-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      border-left: 4px solid var(--accent);
    }
    .task-card.status-done     { border-left-color: var(--green); opacity: 0.7; }
    .task-card.status-blocked  { border-left-color: var(--red); }
    .task-card.overdue         { border-left-color: var(--red); }
    .task-title  { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .task-meta   { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
    .task-project { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 6px; }
    .task-status-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .status-btn {
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1px solid var(--border); background: var(--bg3); cursor: pointer; color: var(--text);
    }
    .status-btn.active-pending    { background: var(--amber);  color: #fff; border-color: var(--amber); }
    .status-btn.active-inprogress { background: var(--accent); color: #fff; border-color: var(--accent); }
    .status-btn.active-done       { background: var(--green);  color: #fff; border-color: var(--green); }
    .status-btn.active-blocked    { background: var(--red);    color: #fff; border-color: var(--red); }
    .due-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .due-overdue  { background: rgba(220,38,38,0.1);   color: var(--red); }
    .due-today    { background: rgba(217,119,6,0.1);   color: var(--amber); }
    .due-upcoming { background: rgba(51,102,255,0.08); color: var(--accent); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }

    /* ── Mode 1: Team Overview Grid ── */
    .staff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 14px;
      padding: 4px 0;
    }
    .staff-grid-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px 16px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: box-shadow 0.15s, transform 0.12s, border-color 0.15s;
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    .staff-grid-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .staff-grid-card.no-tasks {
      opacity: 0.45;
      border-style: dashed;
    }
    .staff-grid-card.no-tasks:hover {
      opacity: 0.65;
      border-color: var(--border);
    }
    .staff-avatar-lg {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    .staff-card-name {
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
    }
    .staff-card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
      min-height: 20px;
    }
    .staff-card-stats {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      width: 100%;
      padding-top: 10px;
      justify-content: center;
    }
    .staff-card-stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .staff-card-stat .val { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1; }
    .staff-card-stat .lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .no-tasks-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 20px 0 8px;
      grid-column: 1 / -1;
    }

    /* ── Mode 2: Personal view header ── */
    .personal-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .personal-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .personal-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
    }
    .personal-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 16px;
      transition: color 0.1s, border-color 0.1s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── Personal view full width ── */
    .personal-view-wrap {
      max-width: 720px;
    }

    /* ── Grid section label ── */
    .grid-section-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 18px 0 8px;
    }
    .overview-header {
      margin-bottom: 18px;
    }
    .overview-header h2 { font-size: 18px; font-weight: 700; }
    .overview-header p  { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    /* ── EOD section ── */
    .eod-section {
      margin-top: 24px;
      border-top: 2px solid var(--border);
      padding-top: 18px;
    }
    .eod-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .eod-warning-card {
      background: rgba(217,119,6,0.08);
      border: 1px solid rgba(217,119,6,0.35);
      border-radius: var(--radius);
      padding: 16px;
    }
    .eod-warning-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--amber);
      margin-bottom: 14px;
    }
    .eod-submitted-card {
      background: rgba(0,200,117,0.07);
      border: 1px solid rgba(0,200,117,0.3);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .eod-submitted-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 6px;
    }
    .eod-submitted-summary {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .eod-form-field { margin-bottom: 12px; }
    .eod-form-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
    .eod-form-field textarea,
    .eod-form-field input[type="number"] {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      box-sizing: border-box;
    }
    .eod-form-field textarea { resize: vertical; min-height: 72px; }
    .eod-form-field input[type="number"] { width: 100px; }
    .eod-submit-btn {
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 9px 22px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
    }
    .eod-submit-btn:hover { filter: brightness(1.1); }
    /* EOD badge on team grid cards */
    .eod-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 14px;
      line-height: 1;
    }

    /* ── Compact task list (personal view redesign) ── */
    .task-list-section { margin-bottom: 2px; }
    .task-section-hdr {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; cursor: pointer;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--text-muted);
      background: var(--bg); border-bottom: 1px solid var(--border);
      border-top: 1px solid var(--border);
      user-select: none; -webkit-user-select: none;
    }
    .task-section-hdr:hover { background: var(--bg2); }
    .task-section-chevron {
      margin-left: auto; font-size: 14px; font-weight: 400;
      transition: transform 0.2s; display: inline-block; line-height: 1;
    }
    .task-section-chevron.collapsed { transform: rotate(-90deg); }
    .task-section-body.collapsed { display: none; }
    .task-row {
      display: flex; align-items: center;
      padding: 10px 12px; border-bottom: 1px solid var(--border);
      min-height: 44px; cursor: pointer;
      background: var(--bg2); transition: background 0.1s;
      gap: 0;
    }
    .task-row:hover { background: var(--bg3); }
    .task-row.is-done { opacity: 0.5; }
    .task-row-icon { width: 24px; flex-shrink: 0; font-size: 16px; line-height: 1; }
    .task-row-title {
      flex: 1; font-size: 14px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      min-width: 0; padding-right: 8px;
    }
    .task-row-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .task-cat-badge {
      font-size: 10px; padding: 2px 5px; border-radius: 4px;
      background: rgba(255,255,255,0.06); color: var(--text-muted);
      border: 1px solid var(--border); white-space: nowrap;
      max-width: 64px; overflow: hidden; text-overflow: ellipsis;
    }
    .task-row-hrs {
      width: 50px; font-size: 13px; text-align: center;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 4px; color: var(--text);
      -moz-appearance: textfield;
    }
    .task-row-hrs::-webkit-outer-spin-button,
    .task-row-hrs::-webkit-inner-spin-button { -webkit-appearance: none; }
    .task-row-hrs-lbl { font-size: 11px; color: var(--text-muted); }
    .task-expand-panel {
      display: none; padding: 10px 12px 12px 48px;
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .task-expand-panel.open { display: block; }
    .task-expand-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .task-expand-btn {
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1px solid var(--border); background: var(--bg3); cursor: pointer; color: var(--text);
    }
    .task-expand-btn:hover { filter: brightness(1.1); }
    .xbtn-done    { background: var(--green)  !important; color: #fff !important; border-color: var(--green)  !important; }
    .xbtn-inprog  { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }
    .xbtn-pending { background: var(--amber)  !important; color: #fff !important; border-color: var(--amber)  !important; }
    .xbtn-del     { color: var(--red) !important; border-color: rgba(226,68,92,0.3) !important; font-size: 11px !important; }
    .task-expand-notes { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-top: 6px; }
    .task-expand-ack   { font-size: 11px; color: var(--green); margin-top: 6px; }
    .task-expand-meta  { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    /* Fixed EOD submit button (personal view only) */
    .eod-fixed-btn {
      position: fixed; bottom: 60px; left: 0; right: 0; z-index: 100;
      padding: 13px 16px; background: var(--green); color: #fff;
      font-size: 15px; font-weight: 700; border: none; cursor: pointer;
      text-align: center; display: none;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.35);
    }
    .eod-fixed-btn:hover { filter: brightness(1.08); }
    /* Extra bottom padding so fixed btn doesn't cover EOD section */
    .personal-view-wrap { padding-bottom: 72px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title"><span>LYS</span> OPS · Team</div>
</div>

<div class="tasks-layout">

  <!-- Left Sidebar -->
  <div class="tasks-sidebar" id="main-sidebar">
    <a href="/" class="staff-nav-btn" style="text-decoration:none;">
      <span class="staff-initial" style="font-size:13px;">📊</span><span>Dashboard</span>
    </a>
    <div class="tasks-sidebar-label">Views</div>
    <a href="/my-tasks" class="staff-nav-btn active" style="text-decoration:none;">
      <span class="staff-initial" style="font-size:13px;">👥</span><span>Team</span>
    </a>
    <a href="/factory" id="sidebar-factory-link" class="staff-nav-btn" style="text-decoration:none;display:flex;align-items:center;gap:8px;">
      <span class="staff-initial">🏭</span><span>Factory</span>
      <span id="sidebar-factory-badge" style="display:none;margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;min-width:16px;height:16px;padding:0 4px;align-items:center;justify-content:center;"></span>
    </a>
    <a href="/installation" class="staff-nav-btn" style="text-decoration:none;">
      <span class="staff-initial" style="font-size:13px;">🔧</span><span>Installation</span>
    </a>
    <a href="/procurement" class="staff-nav-btn" style="text-decoration:none;">
      <span class="staff-initial" style="font-size:13px;">🛒</span><span>Procurement</span>
    </a>
    <a href="/planning" class="staff-nav-btn" style="text-decoration:none;">
      <span class="staff-initial" style="font-size:13px;">📅</span><span>Manpower</span>
    </a>
    <a href="/sales" class="staff-nav-btn" id="nav-sales" style="text-decoration:none;display:none;">
      <span class="staff-initial" style="font-size:13px;">S</span><span>Sales</span>
    </a>
    <a href="/feedback" class="staff-nav-btn" style="text-decoration:none;">
      <span class="staff-initial" style="font-size:13px;">💬</span><span>Feedback</span>
    </a>
    <a href="new-project.html" class="staff-nav-btn" style="background:var(--accent);color:#fff;margin-top:8px;border-radius:var(--radius);text-decoration:none;">
      <span class="staff-initial" style="font-size:16px;background:rgba(255,255,255,0.2);">+</span><span>New Project</span>
    </a>
    <a href="admin.html" class="staff-nav-btn" style="text-decoration:none;margin-top:auto;border-top:1px solid rgba(255,255,255,0.08);padding-top:8px;flex-shrink:0;">
      <span class="staff-initial" style="font-size:13px;">⚙️</span><span>Admin</span>
    </a>
  </div>

  <!-- Main Content -->
  <div class="tasks-main" id="tasks-main">
    <div id="view-root"></div>
    <div style="height:40px;"></div>
  </div>
</div>

<!-- New Task Modal -->
<div id="new-task-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;align-items:center;justify-content:center;">
  <div style="background:var(--bg2);border-radius:12px;width:92%;max-width:480px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
    <div style="padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:15px;font-weight:700;">New Task</div>
      <button id="nt-close" style="background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;line-height:1;padding:0 2px;">×</button>
    </div>
    <div style="padding:18px 22px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px;">

      <!-- Task Type — controls which fields show -->
      <div class="field" style="margin:0;">
        <label style="font-size:12px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:6px;">Task Type <span style="color:var(--red);">*</span></label>
        <div style="display:flex;gap:8px;">
          <button class="nt-type-btn" data-type="Self Task"
            style="flex:1;padding:8px 4px;border-radius:8px;border:2px solid var(--border);background:var(--bg3);cursor:pointer;font-size:12px;font-weight:600;color:var(--text-muted);transition:all 0.15s;">
            👤 Self
          </button>
          <button class="nt-type-btn" data-type="Requested Task"
            style="flex:1;padding:8px 4px;border-radius:8px;border:2px solid var(--border);background:var(--bg3);cursor:pointer;font-size:12px;font-weight:600;color:var(--text-muted);transition:all 0.15s;">
            📋 Requested
          </button>
        </div>
      </div>

      <!-- Title -->
      <div id="nt-title-row" class="field" style="margin:0;">
        <label>Title <span style="color:var(--red);">*</span></label>
        <input type="text" id="nt-title" class="tbl-input" placeholder="What needs to be done…" autocomplete="off">
      </div>

      <div class="field" style="margin:0;">
        <label id="nt-assignee-label">Assigned To</label>
        <select id="nt-assignee" class="tbl-select"><option value="">Unassigned</option></select>
      </div>

      <!-- Requested By (Requested Task only) -->
      <div id="nt-req-row" class="field" style="margin:0;display:none;">
        <label>Requested By <span style="color:var(--red);">*</span></label>
        <select id="nt-requested-by" class="tbl-select"><option value="">—</option></select>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="field" style="margin:0;"><label>Due Date</label><input type="date" id="nt-due" class="tbl-input"></div>
        <div class="field" style="margin:0;"><label>Priority</label>
          <select id="nt-priority" class="tbl-select">
            <option value="Low">Low</option><option value="Medium" selected>Medium</option><option value="High">High</option>
          </select>
        </div>
      </div>

      <!-- Project -->
      <div id="nt-project-row" class="field" style="margin:0;">
        <label>Project</label>
        <select id="nt-project" class="tbl-select"><option value="">No project</option></select>
      </div>

      <!-- Description -->
      <div id="nt-desc-row" class="field" style="margin:0;">
        <label>Description</label>
        <textarea id="nt-desc" class="tbl-input" rows="3" placeholder="Optional details…" style="resize:vertical;"></textarea>
      </div>

    </div>
    <div style="padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;">
      <button class="btn btn-ghost" id="nt-cancel">Cancel</button>
      <button class="btn" id="nt-save" style="background:var(--accent);color:#fff;flex:1;font-weight:600;">Create Task</button>
    </div>
  </div>
</div>

<!-- EOD Form Modal -->
<div id="eod-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;align-items:center;justify-content:center;">
  <div style="background:var(--bg2);border-radius:12px;width:92%;max-width:480px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
    <div style="padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:15px;font-weight:700;">📋 Submit EOD Log</div>
      <button id="eod-modal-close" style="background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;line-height:1;padding:0 2px;">×</button>
    </div>
    <div id="eod-modal-body" style="padding:18px 22px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px;">
      <!-- content injected by openEodModal() -->
    </div>
  </div>
</div>

<script>
// ── Delete confirmation with reason dropdown ──
var DELETE_REASONS = ['Duplicate entry','Created by mistake','No longer needed','Replaced by another','Data entered wrongly','Client / scope change','Other'];
function confirmDelete(title, itemName) {
  var _e = typeof escHtml === 'function' ? escHtml : (typeof esc === 'function' ? esc : function(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');});
  return new Promise(function(resolve) {
    var old = document.getElementById('delete-reason-modal');
    if (old) old.remove();
    var ov = document.createElement('div');
    ov.id = 'delete-reason-modal';
    ov.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:16px;';
    ov.innerHTML = '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;max-width:400px;width:100%;">' +
      '<div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;">' + _e(title||'Confirm Delete') + '</div>' +
      (itemName ? '<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">' + _e(itemName) + '</div>' : '<div style="margin-bottom:12px;"></div>') +
      '<div style="margin-bottom:12px;"><label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);display:block;margin-bottom:4px;">Reason for deletion</label>' +
      '<select id="delete-reason-select" style="width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;"><option value="">-- Select a reason --</option>' +
      DELETE_REASONS.map(function(r){return '<option value="'+_e(r)+'">'+_e(r)+'</option>';}).join('') + '</select></div>' +
      '<div id="delete-reason-error" style="display:none;font-size:12px;color:var(--red);margin-bottom:8px;">Please select a reason.</div>' +
      '<div style="display:flex;gap:8px;justify-content:flex-end;">' +
      '<button type="button" id="delete-cancel-btn" class="btn btn-ghost" style="padding:8px 16px;">Cancel</button>' +
      '<button type="button" id="delete-confirm-btn" class="btn btn-primary" style="padding:8px 16px;background:var(--red);border-color:var(--red);">Delete</button></div></div>';
    document.body.appendChild(ov);
    var sel = ov.querySelector('#delete-reason-select');
    var errDiv = ov.querySelector('#delete-reason-error');
    var cleanup = function(){ov.remove();};
    ov.querySelector('#delete-cancel-btn').addEventListener('click', function(){cleanup();resolve(null);});
    ov.addEventListener('click', function(e){if(e.target===ov){cleanup();resolve(null);}});
    ov.querySelector('#delete-confirm-btn').addEventListener('click', function(){
      if(!sel.value){errDiv.style.display='block';sel.focus();return;}
      var reason=sel.value;cleanup();resolve({reason:reason});
    });
    sel.focus();
  });
}

const todayStr = new Date().toISOString().split('T')[0];
let allTasks = [];
let staffList = [];
let projectsList = [];
const rowHoursMap = {}; // taskId → hours value, persisted across re-renders
let _viewRenderToken = 0; // increments on each render to cancel superseded async renders

// ── Avatar color palette (deterministic by name) ──────────────────────────
const AVATAR_COLORS = [
  '#3366ff','#a25ddc','#00c875','#fdab3d','#e2445c',
  '#00d4c8','#ff7575','#6b7294','#5c9cff','#c84bc8'
];
function avatarColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function initials(name) {
  if (!name || name === 'Unassigned') return '—';
  return name.split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
}

// ── Hash routing ──────────────────────────────────────────────────────────
function getHashName() {
  return decodeURIComponent(window.location.hash.slice(1)).trim().toLowerCase() || null;
}
function resolveStaffByHash(hash) {
  if (!hash) return null;
  return staffList.find(name => {
    const lower = name.toLowerCase();
    return lower === hash || lower.split(/\s+/)[0] === hash;
  }) || null;
}

function applyHashView() {
  const hash    = getHashName();
  const matched = resolveStaffByHash(hash);
  const sidebar = document.getElementById('main-sidebar');

  if (matched) {
    document.title = matched.split(' ')[0] + "'s Tasks — LYS OPS";
    if (sidebar) sidebar.style.display = '';
    renderPersonalView(matched);
  } else {
    document.title = 'Team Tasks — LYS OPS';
    if (sidebar) sidebar.style.display = '';
    renderTeamGrid();
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  const [staffRaw, tasks, projects] = await Promise.all([
    fetch('/api/staff').then(r => r.json()),
    fetch('/api/tasks').then(r => r.json()),
    fetch('/api/projects').then(r => r.json())
  ]);

  const seen = new Set();
  const staffArr = Array.isArray(staffRaw) ? staffRaw : Object.values(staffRaw);
  staffList = staffArr
    .filter(s => s && s.name && !seen.has(s.name) && seen.add(s.name))
    .map(s => s.name)
    .sort();

  allTasks    = tasks;
  projectsList = projects;

  buildSidebarProjects(projects);

  // Bind FIRST so hash navigation works regardless of what follows
  window.addEventListener('popstate',   applyHashView);
  window.addEventListener('hashchange', applyHashView);

  applyHashView();
  setupModalHandlers();
}

async function reloadAndRender() {
  allTasks = await fetch('/api/tasks').then(r => r.json());
  applyHashView();
}

// ── MODE 1: Team Overview Grid ────────────────────────────────────────────
async function renderTeamGrid() {
  const myToken = ++_viewRenderToken;
  const root = document.getElementById('view-root');
  root.innerHTML = '';
  // Hide personal-view-only fixed EOD button
  const eodFixBtn = document.getElementById('eod-fixed-btn');
  if (eodFixBtn) eodFixBtn.style.display = 'none';

  // Group tasks by assignedTo
  const groups = {};
  allTasks.forEach(t => {
    const name = t.assignedTo || 'Unassigned';
    if (!groups[name]) groups[name] = [];
    groups[name].push(t);
  });

  const openCount    = allTasks.filter(t => t.status !== 'Done').length;
  const totalAll     = allTasks.length;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'overview-header';
  hdr.innerHTML =
    '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px;">' +
      '<h2 style="margin:0;">Team Overview</h2>' +
      '<button id="new-task-btn" class="btn" style="background:var(--accent);color:#fff;font-size:12px;font-weight:600;padding:6px 16px;border:none;border-radius:var(--radius);cursor:pointer;flex-shrink:0;">+ New Task</button>' +
    '</div>' +
    '<p>' + staffList.length + ' team members · ' + totalAll + ' task' + (totalAll !== 1 ? 's' : '') + ' · ' + openCount + ' open</p>';
  root.appendChild(hdr);
  hdr.querySelector('#new-task-btn').onclick = () => openNewTaskModal('');

  // Fetch EOD status for all staff in parallel
  const eodMap = {};
  await Promise.all(staffList.map(async name => {
    try {
      const res = await fetch('/api/eod-log?staffName=' + encodeURIComponent(name) + '&date=' + todayStr);
      const data = await res.json();
      eodMap[name] = Array.isArray(data) && data.length > 0;
    } catch (e) {
      eodMap[name] = false;
    }
  }));
  if (myToken !== _viewRenderToken) return; // superseded

  // Build staff data
  const withTasks = [];
  const noTasks   = [];

  staffList.forEach(name => {
    const tasks = groups[name] || [];
    const overdue = tasks.filter(t => t.status !== 'Done' && t.dueDate && t.dueDate < todayStr).length;
    const unacked = tasks.filter(t => t.status !== 'Done' && !t.acknowledgedAt && t.assignedTo && t.assignedTo !== 'Unassigned').length;
    const data = { name, tasks, overdue, unacked };
    if (tasks.length > 0) withTasks.push(data);
    else noTasks.push(data);
  });

  // Sort by overdue desc, then total tasks desc
  withTasks.sort((a, b) => b.overdue - a.overdue || b.tasks.length - a.tasks.length);

  const grid = document.createElement('div');
  grid.className = 'staff-grid';

  function makeCard(data) {
    const card = document.createElement('a');
    card.className = 'staff-grid-card' + (data.tasks.length === 0 ? ' no-tasks' : '');
    card.href = '/my-tasks#' + data.name.split(/\s+/)[0].toLowerCase();

    const avatarEl = document.createElement('div');
    avatarEl.className = 'staff-avatar-lg';
    avatarEl.style.background = data.tasks.length === 0 ? 'var(--border)' : avatarColor(data.name);
    avatarEl.textContent = initials(data.name);

    const nameEl = document.createElement('div');
    nameEl.className = 'staff-card-name';
    nameEl.textContent = data.name;

    const badgesEl = document.createElement('div');
    badgesEl.className = 'staff-card-badges';
    if (data.overdue > 0)
      badgesEl.innerHTML += '<span class="pill pill-red" style="font-size:10px;">' + data.overdue + ' overdue</span>';
    if (data.unacked > 0)
      badgesEl.innerHTML += '<span class="pill pill-amber" style="font-size:10px;">' + data.unacked + ' unseen</span>';

    // EOD badge
    const eodBadge = document.createElement('div');
    eodBadge.className = 'eod-badge';
    eodBadge.title = eodMap[data.name] ? 'EOD submitted today' : 'EOD not submitted today';
    eodBadge.textContent = eodMap[data.name] ? '✅' : '⚠️';
    card.appendChild(eodBadge);

    card.appendChild(avatarEl);
    card.appendChild(nameEl);
    card.appendChild(badgesEl);

    if (data.tasks.length > 0) {
      const openCount = data.tasks.filter(t => t.status !== 'Done').length;
      const statsEl = document.createElement('div');
      statsEl.className = 'staff-card-stats';
      statsEl.innerHTML =
        '<div class="staff-card-stat"><span class="val">' + data.tasks.length + '</span><span class="lbl">Total</span></div>' +
        '<div class="staff-card-stat"><span class="val" style="color:var(--accent);">' + openCount + '</span><span class="lbl">Open</span></div>';
      card.appendChild(statsEl);
    } else {
      const noEl = document.createElement('div');
      noEl.style.cssText = 'font-size:11px;color:var(--text-muted);';
      noEl.textContent = 'No tasks';
      card.appendChild(noEl);
    }

    return card;
  }

  withTasks.forEach(d => grid.appendChild(makeCard(d)));
  noTasks.forEach(d => grid.appendChild(makeCard(d)));

  if (staffList.length === 0) {
    root.innerHTML += '<div class="empty-state">No staff found.</div>';
    return;
  }

  root.appendChild(grid);
}

// ── MODE 2: Personal View ─────────────────────────────────────────────────
async function renderPersonalView(name) {
  const myToken = ++_viewRenderToken;
  const root = document.getElementById('view-root');
  root.innerHTML = '';
  window._eodTotalUpdater = null;

  // Show fixed EOD button (personal view only)
  const eodFixBtn = document.getElementById('eod-fixed-btn');
  if (eodFixBtn) {
    eodFixBtn.style.display = '';
    eodFixBtn.dataset.name = name;
  }

  const wrap = document.createElement('div');
  wrap.className = 'personal-view-wrap';

  // Back button
  const back = document.createElement('a');
  back.className = 'back-btn';
  back.href = '/my-tasks';
  back.innerHTML = '← Team';
  wrap.appendChild(back);

  // Header — exclude "Submit EOD log" task (handled separately via fixed button)
  const myTasks  = allTasks.filter(t => t.assignedTo === name && t.title !== 'Submit EOD log');
  const doneCnt  = myTasks.filter(t => t.status === 'Done').length;
  const totalCnt = myTasks.length;
  const overdue  = myTasks.filter(t => t.status !== 'Done' && t.dueDate && t.dueDate < todayStr);
  const unacked  = myTasks.filter(t => t.status !== 'Done' && !t.acknowledgedAt && t.assignedTo && t.assignedTo !== 'Unassigned').length;

  const hdr = document.createElement('div');
  hdr.className = 'personal-header';
  const av = document.createElement('div');
  av.className = 'personal-avatar';
  av.style.background = avatarColor(name);
  av.textContent = initials(name);

  const hdrText = document.createElement('div');
  const dateLabel = new Date().toLocaleDateString('en-SG', { weekday: 'short', day: 'numeric', month: 'short' });
  const badgeParts = [];
  if (overdue.length) badgeParts.push('<span class="pill pill-red" style="font-size:10px;vertical-align:middle;">' + overdue.length + ' overdue</span>');
  if (unacked)        badgeParts.push('<span class="pill pill-amber" style="font-size:10px;vertical-align:middle;">' + unacked + ' unseen</span>');
  hdrText.innerHTML =
    '<div class="personal-title">' + esc(name.split(' ')[0]) + ' — ' + doneCnt + '/' + totalCnt + ' done · ' + dateLabel +
      (badgeParts.length ? ' &nbsp;' + badgeParts.join(' ') : '') +
    '</div>';

  const addTaskBtn = document.createElement('button');
  addTaskBtn.className = 'btn';
  addTaskBtn.textContent = '+ Add Task';
  addTaskBtn.style.cssText = 'background:var(--accent);color:#fff;font-size:12px;font-weight:600;padding:6px 16px;border:none;border-radius:var(--radius);cursor:pointer;margin-left:auto;flex-shrink:0;';
  addTaskBtn.onclick = () => openNewTaskModal(name);

  hdr.appendChild(av);
  hdr.appendChild(hdrText);
  hdr.appendChild(addTaskBtn);
  wrap.appendChild(hdr);

  if (myTasks.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No tasks assigned to ' + name + '.';
    wrap.appendChild(empty);
  } else {
    // Group tasks by type into three sections so the boss can see at a glance
    // what's mandatory vs what's been asked by teammates vs personal work.
    const typeGroups = [
      {
        label: 'Mandatory Daily Tasks',
        hint:  'Auto-created each morning',
        match: t => t.taskType === 'Recurring',
      },
      {
        label: 'Requests From Team',
        hint:  'Tasks assigned to you by someone else',
        match: t => t.taskType === 'Requested Task',
      },
      {
        label: 'Personal Tasks',
        hint:  'Your own to-do list',
        match: t => t.taskType !== 'Recurring' && t.taskType !== 'Requested Task',
      },
    ];

    typeGroups.forEach(g => {
      const groupTasks = myTasks.filter(g.match);
      wrap.appendChild(buildTypeGroup(g, groupTasks));
    });

    // 4th group: requests YOU sent to other people. Lets the requester see
    // at a glance whether the assignee has seen / done it without hunting
    // through their teammate's view.
    const sentRequests = allTasks.filter(t =>
      t.requestedBy === name &&
      t.assignedTo &&
      t.assignedTo !== name &&
      t.title !== 'Submit EOD log'
    );
    wrap.appendChild(buildTypeGroup({
      label: 'Requests You Sent',
      hint:  'Tasks you asked teammates to do',
      mode:  'requester',
    }, sentRequests));
  }

  // EOD section at the bottom
  const eodSection = await buildEodSection(name);
  if (myToken !== _viewRenderToken) return; // superseded by a newer render
  wrap.appendChild(eodSection);

  root.innerHTML = '';
  root.appendChild(wrap);
}

// ── Compact task section + row helpers ───────────────────────────────────

// Collapsible panel per task TYPE (Mandatory · Requests · Personal).
// Each panel holds the open tasks followed by completed ones.
function buildTypeGroup(group, tasks) {
  const open = tasks.filter(t => t.status !== 'Done');
  const done = tasks.filter(t => t.status === 'Done');
  const isEmpty = tasks.length === 0;

  const wrap = document.createElement('div');
  wrap.className = 'mc-type-group';

  const hdr = document.createElement('div');
  hdr.className = 'mc-type-group-hdr';

  const label = document.createElement('span');
  label.className = 'mc-type-group-label';
  label.textContent = group.label;

  const hint = document.createElement('span');
  hint.className = 'mc-type-group-hint';
  hint.textContent = group.hint;

  const counts = document.createElement('span');
  counts.className = 'mc-type-group-counts';
  counts.innerHTML = '<span class="n-open">' + open.length + '</span> open · <span class="n-done">' + done.length + '</span> done';

  const chev = document.createElement('span');
  // Start collapsed only when the group has no tasks at all.
  const startCollapsed = isEmpty;
  chev.className = 'mc-type-group-chev' + (startCollapsed ? ' collapsed' : '');
  chev.textContent = '▾';

  hdr.appendChild(label);
  hdr.appendChild(hint);
  hdr.appendChild(counts);
  hdr.appendChild(chev);

  const body = document.createElement('div');
  body.className = 'mc-type-group-body' + (startCollapsed ? ' collapsed' : '');

  if (isEmpty) {
    const em = document.createElement('div');
    em.className = 'mc-empty-group';
    em.textContent = 'None';
    body.appendChild(em);
  } else {
    const rowOpts = group.mode === 'requester' ? { mode: 'requester' } : undefined;
    open.forEach(t => {
      const { row, panel } = buildCompactRow(t, rowOpts);
      body.appendChild(row);
      body.appendChild(panel);
    });
    done.forEach(t => {
      const { row, panel } = buildCompactRow(t, rowOpts);
      body.appendChild(row);
      body.appendChild(panel);
    });
  }

  hdr.addEventListener('click', () => {
    const nowCollapsed = body.classList.toggle('collapsed');
    chev.classList.toggle('collapsed', nowCollapsed);
  });

  wrap.appendChild(hdr);
  wrap.appendChild(body);
  return wrap;
}

function buildTaskSection(label, tasks, expanded) {
  const section = document.createElement('div');
  section.className = 'task-list-section';

  const hdr = document.createElement('div');
  hdr.className = 'task-section-hdr';
  const labelSpan = document.createElement('span');
  labelSpan.textContent = label + ' (' + tasks.length + ')';
  const chevron = document.createElement('span');
  chevron.className = 'task-section-chevron' + (expanded ? '' : ' collapsed');
  chevron.textContent = '›';
  hdr.appendChild(labelSpan);
  hdr.appendChild(chevron);

  const body = document.createElement('div');
  body.className = 'task-section-body' + (expanded ? '' : ' collapsed');

  hdr.addEventListener('click', () => {
    const nowCollapsed = body.classList.toggle('collapsed');
    chevron.classList.toggle('collapsed', nowCollapsed);
  });

  tasks.forEach(t => {
    const { row, panel } = buildCompactRow(t);
    body.appendChild(row);
    body.appendChild(panel);
  });

  section.appendChild(hdr);
  section.appendChild(body);
  return section;
}

function buildCompactRow(task, opts) {
  const isRequesterView = opts && opts.mode === 'requester';
  const isDone   = task.status === 'Done';
  const isSeen   = !!task.acknowledgedAt;
  const icon     = isDone ? '✅' : (isSeen ? '👁' : '⏳');
  // Hours logging is only meaningful for a person's OWN work — mandatory
  // recurring tasks and self tasks. Requested tasks (someone asking
  // someone else) don't get hours tracked on them.
  const logsHours = task.taskType !== 'Requested Task' && !isRequesterView;

  // Row
  const row = document.createElement('div');
  row.className = 'task-row' + (isDone ? ' is-done' : '');

  const iconEl = document.createElement('div');
  iconEl.className = 'task-row-icon';
  iconEl.textContent = icon;

  const titleEl = document.createElement('div');
  titleEl.className = 'task-row-title';
  titleEl.textContent = task.title;
  titleEl.title = task.title;

  const rightEl = document.createElement('div');
  rightEl.className = 'task-row-right';

  // Category badge (abbreviated task type)
  const typeShort = { 'Self Task': 'Self', 'Requested Task': 'Req', 'Project Task': 'Proj', 'Recurring': 'Daily' };
  const catBadge = document.createElement('div');
  catBadge.className = 'task-cat-badge';
  catBadge.textContent = typeShort[task.taskType] || (task.taskType || 'Task');
  catBadge.title = task.taskType || '';
  rightEl.appendChild(catBadge);

  // In requester view, surface the assignee + a status pill so the requester
  // can tell at a glance whether the person they asked has seen / done it.
  if (isRequesterView) {
    const whoPill = document.createElement('div');
    whoPill.className = 'pill';
    whoPill.style.cssText = 'background:var(--bg3);color:var(--text-muted);font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;';
    whoPill.textContent = '→ ' + (task.assignedTo || '—').split(' ')[0];
    rightEl.appendChild(whoPill);

    const statusPill = document.createElement('div');
    statusPill.className = 'pill';
    let pillBg, pillFg, pillText;
    if (isDone)      { pillBg = '#dcfce7'; pillFg = '#166534'; pillText = '✓ Done'; }
    else if (isSeen) { pillBg = '#dbeafe'; pillFg = '#1e40af'; pillText = '👁 Seen'; }
    else             { pillBg = '#fef3c7'; pillFg = '#92400e'; pillText = '⏳ Awaiting'; }
    statusPill.style.cssText = 'background:' + pillBg + ';color:' + pillFg + ';font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;';
    statusPill.textContent = pillText;
    rightEl.appendChild(statusPill);
  }

  if (logsHours) {
    // Hours input — persists across re-renders via rowHoursMap
    const hrsInput = document.createElement('input');
    hrsInput.type = 'number';
    hrsInput.min = '0'; hrsInput.max = '24'; hrsInput.step = '0.5';
    hrsInput.className = 'task-row-hrs';
    hrsInput.value = rowHoursMap[task.id] !== undefined ? rowHoursMap[task.id] : '';
    hrsInput.placeholder = '0';
    hrsInput.addEventListener('click', e => e.stopPropagation());
    hrsInput.addEventListener('input', () => {
      rowHoursMap[task.id] = hrsInput.value;
      if (typeof window._eodTotalUpdater === 'function') window._eodTotalUpdater();
    });

    const hrsLbl = document.createElement('span');
    hrsLbl.className = 'task-row-hrs-lbl';
    hrsLbl.textContent = 'hrs';

    rightEl.appendChild(hrsInput);
    rightEl.appendChild(hrsLbl);
  }

  row.appendChild(iconEl);
  row.appendChild(titleEl);
  row.appendChild(rightEl);

  // Expand panel
  const panel = document.createElement('div');
  panel.className = 'task-expand-panel';

  const actionsDiv = document.createElement('div');
  actionsDiv.className = 'task-expand-actions';

  const isEodTask = task.title === 'Submit EOD log';

  if (isEodTask && !isDone) {
    // Special EOD button
    const eodBtn = document.createElement('button');
    eodBtn.className = 'task-expand-btn xbtn-done';
    eodBtn.textContent = '📋 Fill EOD Form';
    eodBtn.addEventListener('click', e => {
      e.stopPropagation();
      openEodModal(task.assignedTo || '', task.id);
    });
    actionsDiv.appendChild(eodBtn);
  } else if (!isRequesterView) {
    if (!isDone) {
      const doneBtn = document.createElement('button');
      doneBtn.className = 'task-expand-btn xbtn-done';
      doneBtn.textContent = '✅ Mark Done';
      doneBtn.addEventListener('click', e => { e.stopPropagation(); updateTaskStatus(task.id, 'Done'); });
      actionsDiv.appendChild(doneBtn);
    }
    if (isDone) {
      const pendBtn = document.createElement('button');
      pendBtn.className = 'task-expand-btn xbtn-pending';
      pendBtn.textContent = '⚠️ Reset to Pending';
      pendBtn.addEventListener('click', e => { e.stopPropagation(); updateTaskStatus(task.id, 'Pending'); });
      actionsDiv.appendChild(pendBtn);
    }
  }

  // Acknowledge / unacknowledge — only the assignee can mark as seen
  if (!task.acknowledgedAt && !isRequesterView) {
    const ackBtn = document.createElement('button');
    ackBtn.className = 'task-expand-btn';
    ackBtn.style.fontSize = '11px';
    ackBtn.textContent = '👁 Mark as Seen';
    ackBtn.addEventListener('click', async e => {
      e.stopPropagation();
      try {
        const res = await fetch('/api/tasks/' + task.id + '/acknowledge', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: task.assignedTo || 'Team' })
        });
        if (!res.ok) { toast('Acknowledge failed', false); return; }
      } catch (err) { console.error('[ACK] error:', err); }
      reloadAndRender();
    });
    actionsDiv.appendChild(ackBtn);
  }

  // Delete
  const delBtn = document.createElement('button');
  delBtn.className = 'task-expand-btn xbtn-del';
  delBtn.textContent = '🗑 Delete';
  delBtn.addEventListener('click', async e => {
    e.stopPropagation();
    const result = await confirmDelete('Delete task?', task.title);
    if (!result) return;
    const res = await fetch('/api/tasks/' + task.id, {
      method: 'DELETE', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ deletedBy: 'Team View', reason: result.reason })
    });
    if (!res.ok) { toast('Delete failed', false); return; }
    reloadAndRender();
  });
  actionsDiv.appendChild(delBtn);
  panel.appendChild(actionsDiv);

  // Acknowledged info + undo
  if (task.acknowledgedAt) {
    const ackInfo = document.createElement('div');
    ackInfo.className = 'task-expand-ack';
    ackInfo.innerHTML =
      '✔ Seen by ' + esc(task.acknowledgedBy || task.assignedTo || '') + ' · ' + task.acknowledgedAt.split('T')[0] +
      ' <button style="font-size:10px;color:var(--text-muted);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0;" class="unack-inline-btn">Undo</button>';
    panel.appendChild(ackInfo);
    ackInfo.querySelector('.unack-inline-btn').addEventListener('click', async e => {
      e.stopPropagation();
      const res = await fetch('/api/tasks/' + task.id, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ acknowledgedAt: null, acknowledgedBy: null })
      });
      if (!res.ok) { toast('Undo failed', false); return; }
      reloadAndRender();
    });
  }

  // Description / notes
  if (task.description) {
    const notes = document.createElement('div');
    notes.className = 'task-expand-notes';
    notes.textContent = task.description.slice(0, 200) + (task.description.length > 200 ? '…' : '');
    panel.appendChild(notes);
  }

  // Meta row: project · due date · requested by
  const metaParts = [];
  if (task.projectJobCode || task.projectName)
    metaParts.push((task.projectJobCode || '') + (task.projectJobCode && task.projectName ? ' · ' : '') + (task.projectName || ''));
  if (task.dueDate) {
    const isOverdue = task.status !== 'Done' && task.dueDate < todayStr;
    metaParts.push((isOverdue ? '🔴 Overdue · ' : 'Due ') + task.dueDate);
  }
  if (task.requestedBy) metaParts.push('Requested by: ' + task.requestedBy);
  if (metaParts.length) {
    const meta = document.createElement('div');
    meta.className = 'task-expand-meta';
    meta.textContent = metaParts.join(' · ');
    panel.appendChild(meta);
  }

  // Toggle expand / collapse on row tap
  let expanded = false;
  row.addEventListener('click', () => {
    expanded = !expanded;
    panel.classList.toggle('open', expanded);
    row.style.background = expanded ? 'var(--bg3)' : '';
  });

  return { row, panel };
}

async function updateTaskStatus(taskId, status) {
  const res = await fetch('/api/tasks/' + taskId, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  if (!res.ok) { toast('Update failed', false); return; }
  reloadAndRender();
}

// ── New Task modal ────────────────────────────────────────────────────────
let _ntTaskType = 'Self Task';

function ntSetType(type) {
  _ntTaskType = type;

  // Update button styles
  document.querySelectorAll('.nt-type-btn').forEach(function(btn) {
    const active = btn.dataset.type === type;
    btn.style.borderColor  = active ? 'var(--accent)' : 'var(--border)';
    btn.style.background   = active ? 'rgba(51,102,255,0.15)' : 'var(--bg3)';
    btn.style.color        = active ? 'var(--accent)' : 'var(--text-muted)';
  });

  // Show/hide fields
  const show = function(id) { document.getElementById(id).style.display = ''; };
  const hide = function(id) { document.getElementById(id).style.display = 'none'; };

  const assigneeLabel = document.getElementById('nt-assignee-label');

  if (type === 'Self Task') {
    show('nt-title-row');
    hide('nt-req-row');
    show('nt-project-row');
    show('nt-desc-row');
    document.getElementById('nt-desc').removeAttribute('readonly');
    document.getElementById('nt-desc').placeholder = 'Optional details…';
    if (assigneeLabel) assigneeLabel.textContent = 'Who are you?';
  } else if (type === 'Requested Task') {
    show('nt-title-row');
    show('nt-req-row');
    show('nt-project-row');
    show('nt-desc-row');
    document.getElementById('nt-desc').removeAttribute('readonly');
    document.getElementById('nt-desc').placeholder = 'Optional details…';
    if (assigneeLabel) assigneeLabel.textContent = 'Assigned To';
  }
}

async function openNewTaskModal(prefilledAssignee) {
  const modal = document.getElementById('new-task-modal');

  // Detect personal view from URL hash if no explicit assignee given
  if (!prefilledAssignee) {
    const hashName = resolveStaffByHash(getHashName());
    if (hashName) prefilledAssignee = hashName;
  }

  // ── Helper: populate a <select> from a names array ─────────────────────
  function fillStaffSelect(selId, placeholder, names, selectedValue) {
    const sel = document.getElementById(selId);
    if (!sel) return;
    sel.innerHTML = '<option value="">' + placeholder + '</option>';
    names.forEach(function(n) {
      const o = document.createElement('option');
      o.value = n; o.textContent = n;
      sel.appendChild(o);
    });
    if (selectedValue) sel.value = selectedValue;
  }

  // ── Step 1: Populate immediately from cached staffList ─────────────────
  // staffList is already populated at init — no waiting
  fillStaffSelect('nt-assignee',    'Unassigned', staffList, prefilledAssignee || '');
  fillStaffSelect('nt-requested-by', '—',         staffList, '');

  // Populate projects from cached projectsList
  (function() {
    const psel = document.getElementById('nt-project');
    psel.innerHTML = '<option value="">No project</option>';
    (projectsList || []).filter(function(p) { return p.status !== 'Completed'; })
      .forEach(function(p) {
        const o = document.createElement('option');
        o.value = p.id; o.textContent = (p.jobCode || p.name || '');
        psel.appendChild(o);
      });
  })();

  // Reset other fields and show modal
  document.getElementById('nt-title').value    = '';
  document.getElementById('nt-desc').value     = '';
  document.getElementById('nt-due').value      = '';
  document.getElementById('nt-priority').value = 'Medium';
  ntSetType('Self Task');
  modal.style.display = 'flex';

  // ── Step 2: Refresh staff + projects from API in background ────────────
  fetch('/api/staff').then(function(r) { return r.json(); }).then(function(staffData) {
    const staffArr = Array.isArray(staffData) ? staffData : Object.values(staffData);
    const seen2 = new Set();
    const freshNames = staffArr
      .filter(function(s) { return s && s.name && !seen2.has(s.name) && seen2.add(s.name); })
      .map(function(s) { return s.name; })
      .sort();
    if (freshNames.length > 0) {
      // Update global cache too
      staffList = freshNames;
      const currentAssignee = document.getElementById('nt-assignee').value;
      fillStaffSelect('nt-assignee',    'Unassigned', freshNames, currentAssignee || prefilledAssignee || '');
      fillStaffSelect('nt-requested-by', '—',         freshNames, '');
    }
  }).catch(function(e) { console.warn('[LYS] Staff refresh error:', e); });

  fetch('/api/projects').then(function(r) { return r.json(); }).then(function(projData) {
    const allProjects = Array.isArray(projData) ? projData : [];
    projectsList = allProjects;
    const psel = document.getElementById('nt-project');
    const currentProj = psel.value;
    psel.innerHTML = '<option value="">No project</option>';
    allProjects.filter(function(p) { return p.status !== 'Completed'; })
      .forEach(function(p) {
        const o = document.createElement('option');
        o.value = p.id; o.textContent = (p.jobCode || p.name || '');
        psel.appendChild(o);
      });
    if (currentProj) psel.value = currentProj;
  }).catch(function(e) { console.warn('[LYS] Projects refresh error:', e); });

  setTimeout(function() {
    const titleEl = document.getElementById('nt-title');
    if (titleEl && titleEl.closest('[style*="display:none"]') === null) titleEl.focus();
  }, 80);
}

function setupModalHandlers() {
  const modal = document.getElementById('new-task-modal');
  const closeModal = function() { modal.style.display = 'none'; };

  // Task type buttons
  document.querySelectorAll('.nt-type-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { ntSetType(btn.dataset.type); });
  });

  document.getElementById('nt-close').onclick  = closeModal;
  document.getElementById('nt-cancel').onclick = closeModal;
  modal.addEventListener('click', function(e) { if (e.target === modal) closeModal(); });

  document.getElementById('nt-save').onclick = async function() {
    const type = _ntTaskType;
    const saveBtn = document.getElementById('nt-save');

    // Validation
    const title = document.getElementById('nt-title').value.trim();
    if (!title) { document.getElementById('nt-title').focus(); return; }
    if (!document.getElementById('nt-assignee').value) {
      document.getElementById('nt-assignee').focus(); return;
    }
    if (type === 'Requested Task' && !document.getElementById('nt-requested-by').value) {
      document.getElementById('nt-requested-by').focus(); return;
    }

    const pid  = document.getElementById('nt-project').value;
    const proj = projectsList.find(function(p) { return p.id === pid; });

    saveBtn.disabled = true;
    const originalLabel = saveBtn.textContent;
    saveBtn.textContent = 'Saving…';
    try {
      const res = await fetch('/api/tasks', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title:          title,
          taskType:       type,
          projectId:      pid,
          projectJobCode: proj ? (proj.jobCode || '') : '',
          projectName:    proj ? (proj.name   || '') : '',
          assignedTo:     document.getElementById('nt-assignee').value,
          requestedBy:    type === 'Requested Task' ? document.getElementById('nt-requested-by').value : '',
          dueDate:        document.getElementById('nt-due').value,
          priority:       document.getElementById('nt-priority').value,
          description:    document.getElementById('nt-desc').value,
          createdBy:      type === 'Requested Task' ? document.getElementById('nt-requested-by').value : document.getElementById('nt-assignee').value
        })
      });
      if (!res.ok) {
        let msg = 'Failed to create task (HTTP ' + res.status + ')';
        try { const j = await res.json(); if (j && j.error) msg = j.error; } catch (_) {}
        alert(msg);
        return;
      }
      closeModal();
      reloadAndRender();
    } catch (e) {
      console.error('[LYS] New task save error:', e);
      alert('Could not reach server. Please try again.');
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = originalLabel;
    }
  };
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── EOD Section ───────────────────────────────────────────────────────────
async function buildEodSection(staffName) {
  const section = document.createElement('div');
  section.className = 'eod-section';

  const title = document.createElement('div');
  title.className = 'eod-section-title';
  title.textContent = 'End of Day Report · ' + todayStr;
  section.appendChild(title);

  // Check if EOD already submitted today
  let submitted = null;
  try {
    const res = await fetch('/api/eod-log?staffName=' + encodeURIComponent(staffName) + '&date=' + todayStr);
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) submitted = data[0];
  } catch (e) { /* ignore */ }

  if (submitted) {
    // Already submitted — show green confirmation card
    const card = document.createElement('div');
    card.className = 'eod-submitted-card';
    card.innerHTML =
      '<div class="eod-submitted-title">✅ EOD submitted for today</div>' +
      '<div class="eod-submitted-summary">' + esc(submitted.summary || '') + '</div>' +
      (submitted.issues ? '<div style="font-size:12px;color:var(--text-muted);margin-top:8px;"><strong>Issues/Blockers:</strong> ' + esc(submitted.issues) + '</div>' : '') +
      '<div style="font-size:11px;color:var(--text-muted);margin-top:6px;">Hours worked: ' + esc(String(submitted.hours || 8)) + '</div>';
    section.appendChild(card);
  } else {
    // Not submitted — show amber warning + form
    const card = document.createElement('div');
    card.className = 'eod-warning-card';

    const warnTitle = document.createElement('div');
    warnTitle.className = 'eod-warning-title';
    warnTitle.textContent = '⚠️ EOD not submitted for today';
    card.appendChild(warnTitle);

    // Hours come from the compact task list (rowHoursMap) — no duplicate inputs here.
    const myListTasks = allTasks.filter(t => t.assignedTo === staffName && t.title !== 'Submit EOD log');

    // Issues field
    const f2 = document.createElement('div');
    f2.className = 'eod-form-field';
    f2.innerHTML = '<label>Any issues or blockers?</label>';
    const issuesTA = document.createElement('textarea');
    issuesTA.placeholder = 'Leave blank if none…';
    issuesTA.style.minHeight = '52px';
    f2.appendChild(issuesTA);
    card.appendChild(f2);

    // Total hours display (live auto-sum from compact task list hours inputs)
    const f3 = document.createElement('div');
    f3.className = 'eod-form-field';
    f3.innerHTML = '<label>Total hours (from task list above)</label>';
    const totalDisplay = document.createElement('div');
    totalDisplay.style.cssText = 'font-size:13px;color:var(--text);padding:4px 0;font-weight:600;';
    f3.appendChild(totalDisplay);
    card.appendChild(f3);

    function sumRowHours() {
      return myListTasks.reduce((s, t) => s + (parseFloat(rowHoursMap[t.id]) || 0), 0);
    }
    function updateSectionTotal() {
      totalDisplay.textContent = 'Total: ' + sumRowHours() + ' hrs';
    }
    updateSectionTotal();
    window._eodTotalUpdater = updateSectionTotal;

    // Submit button
    const submitBtn = document.createElement('button');
    submitBtn.className = 'eod-submit-btn';
    submitBtn.textContent = 'Submit EOD';
    card.appendChild(submitBtn);

    // Error message placeholder
    const errMsg = document.createElement('div');
    errMsg.style.cssText = 'font-size:12px;color:var(--red);margin-top:8px;display:none;';
    card.appendChild(errMsg);

    submitBtn.addEventListener('click', async () => {
      errMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting…';
      const totalHours = sumRowHours();
      const taskEntries = myListTasks
        .map(t => ({ taskId: t.id, hours: parseFloat(rowHoursMap[t.id]) || 0 }))
        .filter(e => e.hours > 0);
      const issuesVal = issuesTA.value.trim();
      const autoSummary = taskEntries
        .map(e => { const task = allTasks.find(y => y.id === e.taskId); return task ? task.title : ''; })
        .filter(Boolean).join(', ');
      try {
        const r = await fetch('/api/eod-log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            staffName,
            date:    todayStr,
            summary: autoSummary,
            issues:  issuesVal,
            hours:   totalHours,
            taskEntries
          })
        });
        if (!r.ok) throw new Error('Server error ' + r.status);

        // Mark "Submit EOD log" task Done and remove its card
        const eodTask = allTasks.find(t => t.assignedTo === staffName && t.title === 'Submit EOD log' && t.status !== 'Done');
        if (eodTask) {
          await fetch('/api/tasks/' + eodTask.id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'Done', completedAt: new Date().toISOString() })
          });
          const eodBtn = document.querySelector('.eod-open-btn[data-taskid="' + eodTask.id + '"]');
          if (eodBtn) eodBtn.closest('.task-card')?.remove();
        }

        // Replace form with success view
        window._eodTotalUpdater = null;
        card.className = 'eod-submitted-card';
        card.innerHTML =
          '<div class="eod-submitted-title">✅ EOD submitted for today</div>' +
          (issuesVal ? '<div style="font-size:12px;color:var(--text-muted);margin-top:8px;"><strong>Issues/Blockers:</strong> ' + esc(issuesVal) + '</div>' : '') +
          '<div style="font-size:11px;color:var(--text-muted);margin-top:6px;">Total hours: ' + totalHours + '</div>';
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit EOD';
        errMsg.textContent = 'Failed to submit. Please try again.';
        errMsg.style.display = '';
      }
    });

    section.appendChild(card);
  }

  return section;
}

        const hrsLabel = document.createElement('span');
        hrsLabel.textContent = 'hrs';

        row.appendChild(hrsInput);

  mCancelBtn.onclick = () => { modal.style.display = 'none'; };
  const mSubmitBtn = document.createElement('button');
  mSubmitBtn.style.cssText = 'flex:2;padding:10px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;';
  mSubmitBtn.textContent = 'Submit EOD';
  mBtnRow.appendChild(mCancelBtn);
  mBtnRow.appendChild(mSubmitBtn);
  body.appendChild(mBtnRow);

  mSubmitBtn.onclick = async () => {
    mErrDiv.style.display = 'none';
    mSubmitBtn.disabled = true;
    mSubmitBtn.textContent = 'Submitting…';
    const totalHours = modalTaskInputs.reduce((s, x) => s + (parseFloat(x.input.value) || 0), 0);
    const taskEntries = modalTaskInputs.map(x => ({ taskId: x.taskId, hours: parseFloat(x.input.value) || 0 }));
    const issuesVal = mIssuesTA.value.trim();
    const autoSummary = modalTaskInputs.map(x => { const task = allTasks.find(y => y.id === x.taskId); return task ? task.title : ''; }).filter(Boolean).join(', ');
    try {
      const r = await fetch('/api/eod-log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          staffName,
          date:    todayStr,
          summary: autoSummary,
          issues:  issuesVal,
          hours:   totalHours,
          taskEntries
        })
      });
      if (!r.ok) throw new Error('Server error ' + r.status);

      // Mark the linked EOD task as Done
      if (taskId) {
        await fetch('/api/tasks/' + taskId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'Done', completedAt: new Date().toISOString() })
        });
      }

      modal.style.display = 'none';
      reloadAndRender();
    } catch (err) {
      mSubmitBtn.disabled = false;
      mSubmitBtn.textContent = 'Submit EOD';
      mErrDiv.textContent = 'Failed to submit. Please try again.';
      mErrDiv.style.display = '';
    }
  };
}

// Close EOD modal on backdrop click
document.getElementById('eod-modal').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});
document.getElementById('eod-modal-close').addEventListener('click', function() {
  document.getElementById('eod-modal').style.display = 'none';
});

function buildSidebarProjects(projects) {
  const container = document.getElementById('sidebar-projects');
  if (!container) return;
  const statusDot = { 'On Track': '#00c875', 'Delayed': '#e2445c', 'On Hold': '#fdab3d', 'Completed': '#6b7294' };
  const active = projects.filter(p => p.status !== 'Completed');
  if (!active.length) { container.innerHTML = '<div style="font-size:11px;color:var(--text-muted);padding:4px 8px;">No active projects</div>'; return; }
  container.innerHTML = active.map(p =>
    `<a href="/project.html?id=${esc(p.id)}" class="staff-nav-btn" style="text-decoration:none;">
      <span class="staff-initial" style="background:${statusDot[p.status]||'var(--border)'};font-size:9px;flex-shrink:0;">${esc((p.jobCode||'').slice(0,4))}</span>
      <span style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.jobCode||p.name)}</span>
    </a>`
  ).join('');
}

init();
</script>
