<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monday Brief — LYS Ops</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0f1a;
      color: #e0e3f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .mon-header {
      background: #141728;
      border-bottom: 2px solid #252a4a;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 16px;
    }
    .mon-branding { display: flex; flex-direction: column; gap: 2px; }
    .mon-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.3px; }
    .mon-title span { color: #4f80ff; }
    .mon-week { font-size: 13px; color: #7880a8; font-weight: 600; }

    .mon-center { flex: 1; display: flex; justify-content: center; align-items: center; }

    .mon-right { display: flex; align-items: center; gap: 12px; }
    .mon-clock {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
      font-family: 'SF Mono', 'Consolas', monospace;
    }
    .refresh-info { font-size: 11px; color: #4a5280; display: flex; align-items: center; gap: 5px; }
    .refresh-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #00c875; flex-shrink: 0;
    }
    .refresh-dot.pulse { animation: blink 0.6s ease; }
    @keyframes blink {
      0%,100% { opacity:1; } 50% { opacity: 0.2; }
    }
    .btn-print {
      background: #252a4a; color: #9aa3cc; border: 1px solid #343a60;
      padding: 6px 13px; border-radius: 6px; cursor: pointer;
      font-size: 12px; font-weight: 600; white-space: nowrap;
    }
    .btn-print:hover { background: #343a60; color: #fff; }
    .btn-back {
      background: transparent; color: #5a6090; border: 1px solid #252a4a;
      padding: 6px 12px; border-radius: 6px; cursor: pointer;
      font-size: 12px; text-decoration: none; white-space: nowrap;
    }
    .btn-back:hover { color: #9aa3cc; border-color: #343a60; }

    /* ── Grid ───────────────────────────────────────────────── */
    .mon-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
      padding: 8px;
      flex: 1;
      min-height: 0;
    }

    .quadrant {
      background: #141728;
      border-radius: 10px;
      border: 1px solid #1e2240;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .quad-header {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 8px;
    }
    .quad-title { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; }
    .quad-count { font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.08); padding: 2px 9px; border-radius: 10px; color: #9aa3cc; }

    .quad-body { flex: 1; overflow-y: auto; padding: 8px 10px; min-height: 0; }
    .quad-body::-webkit-scrollbar { width: 3px; }
    .quad-body::-webkit-scrollbar-thumb { background: #2d3460; border-radius: 2px; }

    /* ── Quadrant colours ───────────────────────────────────── */
    .q-critical .quad-header { background: #2a1520; border-bottom: 2px solid #e2445c; }
    .q-critical .quad-title  { color: #ff6b7a; }

    .q-fab .quad-header { background: #15203a; border-bottom: 2px solid #4f80ff; }
    .q-fab .quad-title  { color: #7ba4ff; }

    .q-requests .quad-header { background: #26200f; border-bottom: 2px solid #fdab3d; }
    .q-requests .quad-title  { color: #ffc166; }

    .q-attendance .quad-header { background: #0f2420; border-bottom: 2px solid #00c875; }
    .q-attendance .quad-title  { color: #4de69f; }

    /* ── RAG ────────────────────────────────────────────────── */
    .rag {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 34px; height: 20px; border-radius: 4px;
      font-size: 9px; font-weight: 800; letter-spacing: 0.5px; flex-shrink: 0;
    }
    .rag-red   { background: #e2445c; color: #fff; }
    .rag-amber { background: #fdab3d; color: #1a1000; }
    .rag-green { background: #00c875; color: #fff; }

    /* ── Project rows ───────────────────────────────────────── */
    .proj-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 7px; margin-bottom: 4px;
      background: #1a1e35; border: 1px solid #252a4a;
    }
    .proj-row.r-red   { border-left: 3px solid #e2445c; }
    .proj-row.r-amber { border-left: 3px solid #fdab3d; }
    .proj-row.r-green { border-left: 3px solid #00c875; }

    .proj-code { font-size: 10px; font-weight: 700; color: #7880a8; min-width: 90px; flex-shrink: 0; }
    .proj-name { flex: 1; font-size: 13px; font-weight: 600; color: #e0e3f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .proj-meta { font-size: 11px; color: #7880a8; white-space: nowrap; flex-shrink: 0; }
    .proj-date { font-size: 11px; color: #7880a8; min-width: 60px; text-align: right; flex-shrink: 0; }

    /* ── Fab queue ──────────────────────────────────────────── */
    .fab-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 7px 10px; border-radius: 7px; margin-bottom: 4px;
      background: #151e35; border: 1px solid #1e2a4a;
    }
    .fab-row.overdue { border-left: 3px solid #e2445c; background: #220f1a; }

    .fab-info { flex: 1; min-width: 0; }
    .fab-desc { font-size: 13px; font-weight: 600; color: #e0e3f0; }
    .fab-sub  { font-size: 11px; color: #7880a8; margin-top: 2px; }
    .fab-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .fab-progress { font-size: 12px; font-weight: 700; }
    .fab-chip {
      font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 8px; white-space: nowrap;
    }
    .chip-done    { background: #00c875; color: #fff; }
    .chip-ip      { background: #4f80ff; color: #fff; }
    .chip-ns      { background: #252a4a; color: #7880a8; }
    .chip-overdue { background: #e2445c; color: #fff; }

    /* ── Site requests ──────────────────────────────────────── */
    .req-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 7px 10px; border-radius: 7px; margin-bottom: 4px;
      background: #1f1b10; border: 1px solid #2d2818;
    }
    .req-row.unack { border-left: 3px solid #e2445c; background: #250f18; }

    .req-main { flex: 1; min-width: 0; }
    .req-item { font-size: 13px; font-weight: 600; color: #e0e3f0; }
    .req-sub  { font-size: 11px; color: #7880a8; margin-top: 2px; }
    .req-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .req-needed { font-size: 10px; color: #ffc166; font-weight: 600; }
    .req-status { font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }

    /* ── Engineer flags ─────────────────────────────────────── */
    .flags-divider { border-top: 1px solid #252a4a; margin: 10px 0 8px; }
    .flags-lbl { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #7880a8; margin-bottom: 6px; }
    .flag-entry { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; padding: 5px 8px; background: #1a1e35; border-radius: 5px; }
    .flag-eng  { font-size: 11px; font-weight: 700; color: #ffc166; min-width: 75px; flex-shrink: 0; }
    .flag-txt  { font-size: 12px; color: #e0e3f0; flex: 1; }
    .flag-del  { background: none; border: none; color: #3a4060; cursor: pointer; font-size: 13px; padding: 0 2px; flex-shrink: 0; }
    .flag-del:hover { color: #e2445c; }
    .flag-form { display: flex; gap: 5px; margin-top: 6px; }
    .flag-sel, .flag-inp {
      background: #1e2240; color: #e0e3f0; border: 1px solid #343a60;
      border-radius: 5px; padding: 5px 8px; font-size: 12px;
      font-family: inherit;
    }
    .flag-sel { min-width: 110px; flex-shrink: 0; }
    .flag-inp { flex: 1; }
    .flag-sel:focus, .flag-inp:focus { outline: none; border-color: #fdab3d; }
    .flag-add  { background: #fdab3d; color: #1a1000; border: none; border-radius: 5px; padding: 5px 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .flag-add:hover { background: #ffc166; }

    /* ── Attendance ─────────────────────────────────────────── */
    .att-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
    .att-stat { background: #1a1e35; border-radius: 7px; padding: 8px 4px; text-align: center; }
    .att-num { font-size: 24px; font-weight: 800; line-height: 1; }
    .att-lbl { font-size: 9px; color: #7880a8; margin-top: 3px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-present .att-num { color: #00c875; }
    .stat-mc      .att-num { color: #e2445c; }
    .stat-absent  .att-num { color: #fdab3d; }
    .stat-site    .att-num { color: #4f80ff; }

    .mc-title { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #e2445c; margin-bottom: 5px; }
    .mc-pill  {
      display: inline-flex; align-items: center; gap: 4px;
      background: #2a101c; border: 1px solid rgba(226,68,92,0.25);
      border-radius: 4px; padding: 3px 8px; margin: 2px;
      font-size: 12px; font-weight: 600; color: #ff8099;
    }

    .section-mini { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #7880a8; margin: 8px 0 5px; }

    /* ── Empty / Loading ────────────────────────────────────── */
    .empty { text-align: center; color: #3a4070; font-size: 13px; padding: 20px 10px; }

    /* ── Print ──────────────────────────────────────────────── */
    @media print {
      body { background: #fff; color: #000; overflow: visible; height: auto; }
      .mon-header { background: #fff; border-bottom: 2px solid #000; }
      .mon-header button, .mon-header a.btn-back { display: none; }
      .mon-grid { height: auto; }
      .quadrant { border: 1px solid #ccc; break-inside: avoid; }
      .quad-body { overflow: visible; }
      .flag-form { display: none; }
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header class="mon-header">
    <div class="mon-branding">
      <div class="mon-title">LYS <span>Monday Brief</span></div>
      <div class="mon-week" id="week-label">Week — · loading…</div>
    </div>
    <div class="mon-center">
      <div class="refresh-info">
        <span class="refresh-dot" id="refresh-dot"></span>
        <span id="refresh-label">Auto-refresh 3 min</span>
      </div>
    </div>
    <div class="mon-right">
      <div class="mon-clock" id="clock">--:--:--</div>
      <button class="btn-print" onclick="window.print()">🖨 Print</button>
      <a href="/" class="btn-back">← Dashboard</a>
    </div>
  </header>

  <!-- ── 4 Quadrants ── -->
  <div class="mon-grid">

    <!-- TL: Critical This Week -->
    <div class="quadrant q-critical">
      <div class="quad-header">
        <span class="quad-title">🔴 Critical This Week</span>
        <span class="quad-count" id="cnt-critical">—</span>
      </div>
      <div class="quad-body" id="body-critical"><div class="empty">Loading…</div></div>
    </div>

    <!-- TR: Fab Queue This Week -->
    <div class="quadrant q-fab">
      <div class="quad-header">
        <span class="quad-title">🏭 Fab Queue This Week</span>
        <span class="quad-count" id="cnt-fab">—</span>
      </div>
      <div class="quad-body" id="body-fab"><div class="empty">Loading…</div></div>
    </div>

    <!-- BL: Site Requests -->
    <div class="quadrant q-requests">
      <div class="quad-header">
        <span class="quad-title">📦 Site Requests Pending</span>
        <span class="quad-count" id="cnt-req">—</span>
      </div>
      <div class="quad-body" id="body-req"><div class="empty">Loading…</div></div>
    </div>

    <!-- BR: Attendance -->
    <div class="quadrant q-attendance">
      <div class="quad-header">
        <span class="quad-title">👷 Attendance Today</span>
        <span class="quad-count" id="cnt-att">—</span>
      </div>
      <div class="quad-body" id="body-att"><div class="empty">Loading…</div></div>
    </div>

  </div>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtShort(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return String(d);
  return dt.toLocaleDateString('en-SG', { day: 'numeric', month: 'short' });
}

function daysDiff(dateStr) {
  if (!dateStr) return null;
  const t = new Date(dateStr); if (isNaN(t)) return null;
  const n = new Date(); n.setHours(0,0,0,0); t.setHours(0,0,0,0);
  return Math.round((t - n) / 86400000);
}

function weekRange(d) {
  const dt = d ? new Date(d) : new Date();
  const day = dt.getDay();
  const mon = new Date(dt); mon.setDate(dt.getDate() + (day === 0 ? -6 : 1 - day));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return { mon, sun };
}

function isoWeekNum(d) {
  const dt = new Date(d.getTime()); dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() + 3 - (dt.getDay()+6)%7);
  const w1 = new Date(dt.getFullYear(),0,4);
  return 1 + Math.round(((dt-w1)/86400000 - 3 + (w1.getDay()+6)%7)/7);
}

function ragClass(p) {
  const d = daysDiff(p.endDate);
  const fab = p.fabPercent || 0;
  if (d !== null && d <= 7  && fab < 80) return 'red';
  if (d !== null && d <= 14 && fab < 60) return 'amber';
  return 'green';
}

// ── Clock + week label ────────────────────────────────────────────────────

function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-SG', {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}
setInterval(tick, 1000); tick();

(function setWeek() {
  const {mon, sun} = weekRange();
  const opts = {day:'numeric', month:'short'};
  document.getElementById('week-label').textContent =
    `Week ${isoWeekNum(mon)} · ${mon.toLocaleDateString('en-SG',opts)} – ${sun.toLocaleDateString('en-SG',opts)}`;
})();

// ── Q1: Critical This Week ────────────────────────────────────────────────

async function loadCritical() {
  try {
    const projects = await fetch('/api/projects').then(r=>r.json());
    const list = Array.isArray(projects) ? projects : (projects.projects||[]);
    const active = list.filter(p => p.status !== 'Completed' && p.status !== 'Cancelled' && p.status !== 'On Hold');

    const sorted = active.map(p => ({...p, _rag: ragClass(p)}))
      .sort((a,b) => ({red:0,amber:1,green:2}[a._rag] - {red:0,amber:1,green:2}[b._rag]));

    document.getElementById('cnt-critical').textContent = sorted.length + ' projects';

    if (!sorted.length) {
      document.getElementById('body-critical').innerHTML = '<div class="empty">No active projects</div>';
      return;
    }

    const fabColor = pct => pct >= 80 ? '#00c875' : pct >= 50 ? '#fdab3d' : '#e2445c';

    document.getElementById('body-critical').innerHTML = sorted.map(p => {
      const fab = p.fabPercent || 0;
      const inst = p.installPercent || 0;
      const days = daysDiff(p.endDate);
      const daysLabel = days === null ? '' : days < 0 ? `<span style="color:#e2445c;font-weight:700">${Math.abs(days)}d overdue</span>` : `${days}d left`;
      return `<div class="proj-row r-${p._rag}">
        <span class="rag rag-${p._rag}">${p._rag.toUpperCase()}</span>
        <span class="proj-code">${esc(p.jobCode||'—')}</span>
        <span class="proj-name" title="${esc(p.projectName)}">${esc(p.projectName||'—')}</span>
        <span class="proj-meta">
          <span style="color:${fabColor(fab)}">F:${fab}%</span>&nbsp;
          <span style="color:#7880a8">I:${inst}%</span>
        </span>
        <span class="proj-date">${p.endDate ? fmtShort(p.endDate) : '—'}${daysLabel ? '<br><small>'+daysLabel+'</small>' : ''}</span>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('body-critical').innerHTML = '<div class="empty">Failed to load</div>';
  }
}

// ── Q2: Fab Queue This Week ───────────────────────────────────────────────

async function loadFabQueue() {
  try {
    const data = await fetch('/api/factory-queue').then(r=>r.json());
    // data = array of { projectId, jobCode, projectName, endDate, items: [...] }
    const groups = Array.isArray(data) ? data : [];

    // Flatten items not yet done, show items due this week or overdue first
    const flat = [];
    groups.forEach(grp => {
      (grp.items||[]).forEach(it => {
        if (it.status === 'Completed') return; // skip fully done
        flat.push({ ...it, jobCode: grp.jobCode, projectName: grp.projectName, endDate: grp.endDate });
      });
    });

    // Sort: overdue first, then by daysUntilNeeded
    flat.sort((a,b) => {
      const ao = a.isOverdue ? 0 : 1, bo = b.isOverdue ? 0 : 1;
      if (ao !== bo) return ao - bo;
      const an = a.daysUntilNeeded ?? 999, bn = b.daysUntilNeeded ?? 999;
      return an - bn;
    });

    // Show pending items (limit to this week + overdue)
    const thisWeek = flat.filter(it => {
      if (it.isOverdue) return true;
      if (it.daysUntilNeeded !== null && it.daysUntilNeeded <= 7) return true;
      return false;
    });
    const display = thisWeek.length > 0 ? thisWeek : flat.slice(0, 12);

    document.getElementById('cnt-fab').textContent = flat.length + ' pending';

    if (!flat.length) {
      document.getElementById('body-fab').innerHTML = '<div class="empty">Fab queue clear ✓</div>';
      return;
    }

    const progColor = (done, total) => {
      if (!total) return '#7880a8';
      const r = done/total;
      return r >= 0.8 ? '#00c875' : r >= 0.4 ? '#fdab3d' : '#e2445c';
    };

    const chipClass = (it) => {
      if (it.isOverdue) return 'chip-overdue';
      if (it.status === 'Done' || it.status === 'Completed') return 'chip-done';
      if (it.status === 'In Progress') return 'chip-ip';
      return 'chip-ns';
    };

    document.getElementById('body-fab').innerHTML = display.map(it => {
      const done = it.doneQty ?? 0;
      const total = it.totalQty ?? 0;
      const label = it.isOverdue ? 'OVERDUE' : (it.status || 'Not Started');
      return `<div class="fab-row${it.isOverdue?' overdue':''}">
        <div class="fab-info">
          <div class="fab-desc">${esc(it.description||'—')}</div>
          <div class="fab-sub">${esc(it.jobCode||'')}${it.daysUntilNeeded !== null ? ' · Due in '+it.daysUntilNeeded+'d' : (it.endDate ? ' · End: '+fmtShort(it.endDate) : '')}</div>
        </div>
        <div class="fab-right">
          <span class="fab-progress" style="color:${progColor(done,total)}">${done}/${total}</span>
          <span class="fab-chip ${chipClass(it)}">${esc(label)}</span>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('body-fab').innerHTML = '<div class="empty">Failed to load</div>';
  }
}

// ── Q3: Site Requests + Engineer Flags ───────────────────────────────────

function hoursOld(dateStr) {
  if (!dateStr) return 0;
  const d = new Date(dateStr);
  return isNaN(d) ? 0 : (Date.now() - d)/3600000;
}

const { mon: _wkMon } = weekRange();
const THIS_WEEK_START = _wkMon.toISOString().slice(0,10);

async function loadSiteRequests() {
  try {
    const [reqs, flags] = await Promise.all([
      fetch('/api/site-requests').then(r=>r.json()),
      fetch('/api/monday-flags').then(r=>r.json()).catch(()=>[])
    ]);

    const pending = (Array.isArray(reqs)?reqs:[]).filter(r =>
      r.status === 'New' || r.status === 'Acknowledged' || r.status === 'Pending'
    );

    document.getElementById('cnt-req').textContent = pending.length + ' pending';

    let html = '';

    if (!pending.length) {
      html += '<div class="empty">No pending requests ✓</div>';
    } else {
      html += pending.map(r => {
        const age = hoursOld(r.createdAt || r.date);
        const unack = r.status === 'New' && age > 24;
        const sColor = r.status === 'New' ? '#e2445c' : r.status === 'Acknowledged' ? '#fdab3d' : '#9aa3cc';
        return `<div class="req-row${unack?' unack':''}">
          <div class="req-main">
            <div class="req-item">${esc(r.item||r.description||r.title||'—')}</div>
            <div class="req-sub">${esc(r.projectJobCode||r.projectName||r.jobCode||'')} · ${esc(r.requestedBy||r.engineer||'')}</div>
          </div>
          <div class="req-right">
            ${r.neededByDate ? `<span class="req-needed">📅 ${fmtShort(r.neededByDate)}</span>` : ''}
            <span class="req-status" style="background:${sColor}22;color:${sColor};border:1px solid ${sColor}44">${esc(r.status||'New')}</span>
          </div>
        </div>`;
      }).join('');
    }

    // Engineer flags
    const weekFlags = (Array.isArray(flags)?flags:[]).filter(f => f.weekStart === THIS_WEEK_START);
    html += `<div class="flags-divider"></div>
      <div class="flags-lbl">⚑ Site Flags This Week</div>`;

    if (weekFlags.length) {
      html += weekFlags.map(f => `
        <div class="flag-entry">
          <span class="flag-eng">${esc(f.engineer)}</span>
          <span class="flag-txt">• ${esc(f.text)}</span>
          <button class="flag-del" onclick="delFlag('${esc(f.id)}')" title="Remove">✕</button>
        </div>`).join('');
    } else {
      html += '<div style="color:#3a4070;font-size:12px;padding:4px 0;">No flags yet this week</div>';
    }

    html += `<div class="flag-form">
      <select class="flag-sel" id="flag-eng">
        <option value="">Engineer…</option>
        <option>Teo Meei Haw</option>
        <option>Jun Jie</option>
        <option>Lai Wei Xiang</option>
        <option>Chris</option>
        <option>Janessa</option>
      </select>
      <input class="flag-inp" id="flag-txt" type="text" placeholder="Site flag note…" maxlength="120">
      <button class="flag-add" onclick="addFlag()">+ Add</button>
    </div>`;

    document.getElementById('body-req').innerHTML = html;
  } catch(e) {
    document.getElementById('body-req').innerHTML = '<div class="empty">Failed to load</div>';
  }
}

async function addFlag() {
  const eng = (document.getElementById('flag-eng')?.value||'').trim();
  const txt = (document.getElementById('flag-txt')?.value||'').trim();
  if (!eng || !txt) { alert('Select engineer and enter a note'); return; }
  await fetch('/api/monday-flags', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ engineer: eng, text: txt, weekStart: THIS_WEEK_START })
  });
  loadSiteRequests();
}

async function delFlag(id) {
  await fetch('/api/monday-flags/'+encodeURIComponent(id), { method: 'DELETE' });
  loadSiteRequests();
}

// ── Q4: Attendance Today ──────────────────────────────────────────────────

async function loadAttendance() {
  try {
    const rec = await fetch('/api/attendance/today').then(r=>r.json());

    if (!rec || !rec.records || !rec.records.length) {
      document.getElementById('cnt-att').textContent = 'No data';
      document.getElementById('body-att').innerHTML = `
        <div class="att-summary">
          <div class="att-stat stat-present"><div class="att-num">—</div><div class="att-lbl">Present</div></div>
          <div class="att-stat stat-mc"><div class="att-num">—</div><div class="att-lbl">MC</div></div>
          <div class="att-stat stat-absent"><div class="att-num">—</div><div class="att-lbl">Absent</div></div>
          <div class="att-stat stat-site"><div class="att-num">—</div><div class="att-lbl">On Site</div></div>
        </div>
        <div class="empty">Attendance not logged yet today</div>`;
      return;
    }

    const counts = { present:0, mc:0, absent:0, site:0 };
    const mcNames = [];

    rec.records.forEach(w => {
      const s = (w.status||'').toLowerCase().replace(/\s+/g,'');
      if (s==='present')                      counts.present++;
      else if (s==='mc'||s==='medical')       { counts.mc++; mcNames.push(w.name||w.workerName||'?'); }
      else if (s==='absent')                  counts.absent++;
      else if (s==='onsite'||s==='site')      counts.site++;
      else if (s==='present')                 counts.present++;
    });

    const total = counts.present + counts.mc + counts.absent + counts.site;
    document.getElementById('cnt-att').textContent = total + ' workers';

    let html = `<div class="att-summary">
      <div class="att-stat stat-present"><div class="att-num">${counts.present}</div><div class="att-lbl">Present</div></div>
      <div class="att-stat stat-mc"><div class="att-num">${counts.mc}</div><div class="att-lbl">MC</div></div>
      <div class="att-stat stat-absent"><div class="att-num">${counts.absent}</div><div class="att-lbl">Absent</div></div>
      <div class="att-stat stat-site"><div class="att-num">${counts.site}</div><div class="att-lbl">On Site</div></div>
    </div>`;

    if (mcNames.length) {
      html += `<div class="mc-title">🏥 On MC Today</div>
        <div style="margin-bottom:8px">${mcNames.map(n=>`<span class="mc-pill">🤒 ${esc(n)}</span>`).join('')}</div>`;
    }

    // Show full list
    if (rec.records.length > 0) {
      html += `<div class="section-mini">Worker List</div>`;
      html += rec.records.map(w => {
        const s = (w.status||'Present');
        const sc = s.toLowerCase() === 'present' ? '#00c875' : s.toLowerCase()==='mc'||s.toLowerCase()==='medical' ? '#e2445c' : s.toLowerCase()==='absent' ? '#fdab3d' : '#4f80ff';
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #1e2240;font-size:12px;">
          <span style="color:#e0e3f0;font-weight:600">${esc(w.name||w.workerName||'—')}</span>
          <span style="color:${sc};font-size:10px;font-weight:700">${esc(s)}</span>
        </div>`;
      }).join('');
    }

    document.getElementById('body-att').innerHTML = html;
  } catch(e) {
    document.getElementById('body-att').innerHTML = '<div class="empty">Failed to load attendance</div>';
  }
}

// ── Refresh all ───────────────────────────────────────────────────────────

async function loadAll() {
  const dot = document.getElementById('refresh-dot');
  dot.classList.add('pulse');
  await Promise.all([loadCritical(), loadFabQueue(), loadSiteRequests(), loadAttendance()]);
  dot.classList.remove('pulse');
  document.getElementById('refresh-label').textContent =
    'Refreshed ' + new Date().toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit'});
}

loadAll();
setInterval(loadAll, 3 * 60 * 1000);
</script>
